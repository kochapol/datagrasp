<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataGrasp | AI Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass-container">
        <header>
            <h1>DataGrasp 📊</h1>
            <p>AI-Powered Document Processing</p>
        </header>

        <section id="auth-section" class="active">
            <div class="input-group">
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button id="login-btn" class="primary-btn">Log In / Sign Up</button>
        </section>

        <section id="app-section" style="display: none;">
            <div class="user-bar">
                <p>Welcome, <span id="user-email" class="highlight"></span></p>
                <button id="logout-btn" class="secondary-btn">Logout</button>
            </div>

            <div class="upload-area">
                <h3>Upload a CSV File</h3>
                <div class="file-input-wrapper">
                    <input type="file" id="csv-file" accept=".csv">
                </div>
                <button id="analyze-btn" class="primary-btn">✨ Analyze Document</button>
            </div>

            <div id="loading" style="display: none;">
                <div class="spinner"></div>
                <p>AI is analyzing your data...</p>
            </div>

            <div id="result-box" style="display: none;">
                <h3>AI Analysis:</h3>
                <div id="ai-response"></div>
            </div>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
